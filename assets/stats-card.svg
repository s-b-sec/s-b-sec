<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
    </style>
    <pattern id="scan2" x="0" y="0" width="800" height="3" patternUnits="userSpaceOnUse">
      <rect width="800" height="1" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="30" rx="10" fill="#161b22"/>
  <rect y="20" width="800" height="12" fill="#161b22"/>
  <circle cx="22" cy="15" r="5.5" fill="#ff5f57"/>
  <circle cx="41" cy="15" r="5.5" fill="#febc2e"/>
  <circle cx="60" cy="15" r="5.5" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#484f58" font-size="12" class="mono">~/s-b-sec — stats</text>

  <!-- Divider line -->
  <line x1="20" y1="50" x2="780" y2="50" stroke="#21262d" stroke-width="1"/>

  <!-- LEFT COLUMN: Languages -->
  <text x="40" y="76" fill="#39d353" font-size="12" class="mono">$ cat languages.conf</text>

  <!-- C -->
  <text x="40" y="100" fill="#cdd6f4" font-size="13" class="mono">C</text>
  <rect x="80" y="88" width="220" height="14" rx="7" fill="#21262d"/>
  <rect x="80" y="88" width="180" height="14" rx="7" fill="#e06c75" opacity="0.85"/>
  <text x="312" y="100" fill="#484f58" font-size="11" class="mono">primary</text>

  <!-- Python -->
  <text x="40" y="124" fill="#cdd6f4" font-size="13" class="mono">Python</text>
  <rect x="115" y="112" width="185" height="14" rx="7" fill="#21262d"/>
  <rect x="115" y="112" width="140" height="14" rx="7" fill="#56b6c2" opacity="0.85"/>
  <text x="312" y="124" fill="#484f58" font-size="11" class="mono">scripting</text>

  <!-- Bash -->
  <text x="40" y="148" fill="#cdd6f4" font-size="13" class="mono">Bash</text>
  <rect x="93" y="136" width="207" height="14" rx="7" fill="#21262d"/>
  <rect x="93" y="136" width="160" height="14" rx="7" fill="#39d353" opacity="0.85"/>
  <text x="312" y="148" fill="#484f58" font-size="11" class="mono">automation</text>

  <!-- MySQL -->
  <text x="40" y="172" fill="#cdd6f4" font-size="13" class="mono">MySQL</text>
  <rect x="110" y="160" width="190" height="14" rx="7" fill="#21262d"/>
  <rect x="110" y="160" width="100" height="14" rx="7" fill="#FFD700" opacity="0.75"/>
  <text x="312" y="172" fill="#484f58" font-size="11" class="mono">data</text>

  <!-- Vertical divider -->
  <line x1="400" y1="55" x2="400" y2="200" stroke="#21262d" stroke-width="1"/>

  <!-- RIGHT COLUMN: Tools / Focus -->
  <text x="420" y="76" fill="#39d353" font-size="12" class="mono">$ cat tooling.conf</text>

  <!-- Tool rows -->
  <text x="420" y="100" fill="#e06c75" font-size="12" class="mono">OS</text>
  <text x="460" y="100" fill="#cdd6f4" font-size="12" class="mono">Kali Linux · Ubuntu</text>

  <text x="420" y="120" fill="#e06c75" font-size="12" class="mono">VCS</text>
  <text x="460" y="120" fill="#cdd6f4" font-size="12" class="mono">Git</text>

  <text x="420" y="140" fill="#e06c75" font-size="12" class="mono">EDR</text>
  <text x="460" y="140" fill="#cdd6f4" font-size="12" class="mono">Vim</text>

  <text x="420" y="160" fill="#e06c75" font-size="12" class="mono">NET</text>
  <text x="460" y="160" fill="#cdd6f4" font-size="12" class="mono">Nmap · Wireshark · BruteSpray</text>

  <text x="420" y="180" fill="#e06c75" font-size="12" class="mono">SIEM</text>
  <text x="460" y="180" fill="#cdd6f4" font-size="12" class="mono">Splunk</text>

  <text x="420" y="200" fill="#e06c75" font-size="12" class="mono">VIRT</text>
  <text x="460" y="200" fill="#cdd6f4" font-size="12" class="mono">VMware</text>

  <!-- Scanline overlay -->
  <rect width="800" height="220" rx="10" fill="url(#scan2)" opacity="1"/>
</svg>
