<svg xmlns="http://www.w3.org/2000/svg" width="800" height="230" viewBox="0 0 800 230">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
    </style>
    <pattern id="scan4" x="0" y="0" width="800" height="3" patternUnits="userSpaceOnUse">
      <rect width="800" height="1" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="230" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="30" rx="10" fill="#161b22"/>
  <rect y="20" width="800" height="12" fill="#161b22"/>
  <circle cx="22" cy="15" r="5.5" fill="#ff5f57"/>
  <circle cx="41" cy="15" r="5.5" fill="#febc2e"/>
  <circle cx="60" cy="15" r="5.5" fill="#28c840"/>
  <text x="400" y="20" text-anchor="middle" fill="#484f58" font-size="12" class="mono">~/s-b-sec — achievements</text>

  <!-- Prompt -->
  <text y="60" font-size="13" class="mono">
    <tspan x="20" fill="#39d353">└─</tspan>
    <tspan fill="#e06c75">$ </tspan>
    <tspan fill="#cdd6f4">ls -la ./achievements/</tspan>
  </text>

  <!-- ── Trophy 1: First Commit ── x=20 -->
  <rect x="20" y="76" width="170" height="130" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <!-- trophy cup shape -->
  <rect x="75" y="88" width="60" height="42" rx="4" fill="none" stroke="#FFD700" stroke-width="2"/>
  <path d="M75 100 Q55 100 55 115 Q55 128 75 128" fill="none" stroke="#FFD700" stroke-width="2"/>
  <path d="M135 100 Q155 100 155 115 Q155 128 135 128" fill="none" stroke="#FFD700" stroke-width="2"/>
  <rect x="97" y="130" width="16" height="12" fill="#FFD700" opacity="0.8"/>
  <rect x="88" y="142" width="34" height="5" rx="2" fill="#FFD700" opacity="0.8"/>
  <!-- star inside cup -->
  <text x="105" y="118" text-anchor="middle" fill="#FFD700" font-size="18" class="mono">★</text>
  <text x="105" y="163" text-anchor="middle" fill="#cdd6f4" font-size="11" class="mono">First Commit</text>
  <text x="105" y="178" text-anchor="middle" fill="#484f58" font-size="10" class="mono">repo created</text>
  <!-- badge color bar -->
  <rect x="20" y="196" width="170" height="4" rx="2" fill="#FFD700" opacity="0.6"/>
  <text x="105" y="210" text-anchor="middle" fill="#FFD700" font-size="10" class="mono">GOLD</text>

  <!-- ── Trophy 2: Commits ── x=210 -->
  <rect x="210" y="76" width="170" height="130" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="265" y="88" width="60" height="42" rx="4" fill="none" stroke="#39d353" stroke-width="2"/>
  <path d="M265 100 Q245 100 245 115 Q245 128 265 128" fill="none" stroke="#39d353" stroke-width="2"/>
  <path d="M325 100 Q345 100 345 115 Q345 128 325 128" fill="none" stroke="#39d353" stroke-width="2"/>
  <rect x="287" y="130" width="16" height="12" fill="#39d353" opacity="0.8"/>
  <rect x="278" y="142" width="34" height="5" rx="2" fill="#39d353" opacity="0.8"/>
  <text x="295" y="115" text-anchor="middle" fill="#39d353" font-size="13" class="mono">12</text>
  <text x="295" y="127" text-anchor="middle" fill="#39d353" font-size="9" class="mono">commits</text>
  <text x="295" y="163" text-anchor="middle" fill="#cdd6f4" font-size="11" class="mono">Commits</text>
  <text x="295" y="178" text-anchor="middle" fill="#484f58" font-size="10" class="mono">active contributor</text>
  <rect x="210" y="196" width="170" height="4" rx="2" fill="#39d353" opacity="0.6"/>
  <text x="295" y="210" text-anchor="middle" fill="#39d353" font-size="10" class="mono">GREEN</text>

  <!-- ── Trophy 3: Security Focus ── x=400 -->
  <rect x="400" y="76" width="170" height="130" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="455" y="88" width="60" height="42" rx="4" fill="none" stroke="#56b6c2" stroke-width="2"/>
  <path d="M455 100 Q435 100 435 115 Q435 128 455 128" fill="none" stroke="#56b6c2" stroke-width="2"/>
  <path d="M515 100 Q535 100 535 115 Q535 128 515 128" fill="none" stroke="#56b6c2" stroke-width="2"/>
  <rect x="477" y="130" width="16" height="12" fill="#56b6c2" opacity="0.8"/>
  <rect x="468" y="142" width="34" height="5" rx="2" fill="#56b6c2" opacity="0.8"/>
  <!-- shield icon -->
  <path d="M485 95 L505 95 L505 112 Q505 120 485 124 Q465 120 465 112 L465 95 Z" fill="none" stroke="#56b6c2" stroke-width="1.5" transform="translate(0,0) scale(0.85) translate(75,16)"/>
  <text x="485" y="118" text-anchor="middle" fill="#56b6c2" font-size="16" class="mono">⚔</text>
  <text x="485" y="163" text-anchor="middle" fill="#cdd6f4" font-size="11" class="mono">Security Focus</text>
  <text x="485" y="178" text-anchor="middle" fill="#484f58" font-size="10" class="mono">pen tester path</text>
  <rect x="400" y="196" width="170" height="4" rx="2" fill="#56b6c2" opacity="0.6"/>
  <text x="485" y="210" text-anchor="middle" fill="#56b6c2" font-size="10" class="mono">CYAN</text>

  <!-- ── Trophy 4: Student Dev ── x=590 -->
  <rect x="590" y="76" width="170" height="130" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="645" y="88" width="60" height="42" rx="4" fill="none" stroke="#e06c75" stroke-width="2"/>
  <path d="M645 100 Q625 100 625 115 Q625 128 645 128" fill="none" stroke="#e06c75" stroke-width="2"/>
  <path d="M705 100 Q725 100 725 115 Q725 128 705 128" fill="none" stroke="#e06c75" stroke-width="2"/>
  <rect x="667" y="130" width="16" height="12" fill="#e06c75" opacity="0.8"/>
  <rect x="658" y="142" width="34" height="5" rx="2" fill="#e06c75" opacity="0.8"/>
  <text x="675" y="118" text-anchor="middle" fill="#e06c75" font-size="16" class="mono">✦</text>
  <text x="675" y="163" text-anchor="middle" fill="#cdd6f4" font-size="11" class="mono">Student Dev</text>
  <text x="675" y="178" text-anchor="middle" fill="#484f58" font-size="10" class="mono">B.Tech CSE 2024</text>
  <rect x="590" y="196" width="170" height="4" rx="2" fill="#e06c75" opacity="0.6"/>
  <text x="675" y="210" text-anchor="middle" fill="#e06c75" font-size="10" class="mono">RISING</text>

  <!-- Scanline -->
  <rect width="800" height="230" rx="10" fill="url(#scan4)" opacity="1"/>
</svg>
