<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <style>.mono { font-family: 'Courier New', Courier, monospace; }</style>
    <pattern id="scan" x="0" y="0" width="800" height="3" patternUnits="userSpaceOnUse">
      <rect width="800" height="1" fill="rgba(0,0,0,0.12)"/>
    </pattern>
  </defs>

  <rect width="800" height="160" rx="10" fill="#0d1117"/>
  <rect width="800" height="26" rx="10" fill="#161b22"/>
  <rect y="16" width="800" height="10" fill="#161b22"/>
  <circle cx="18" cy="13" r="4.5" fill="#ff5f57"/>
  <circle cx="34" cy="13" r="4.5" fill="#febc2e"/>
  <circle cx="50" cy="13" r="4.5" fill="#28c840"/>
  <text x="400" y="18" text-anchor="middle" fill="#484f58" font-size="11" class="mono">~/s-b-sec — overview</text>

  <!-- prompt -->
  <text y="52" font-size="12" class="mono">
    <tspan x="20" fill="#39d353">└─</tspan><tspan fill="#e06c75">$ </tspan><tspan fill="#484f58">cat profile.json</tspan>
  </text>

  <!-- left brace -->
  <text x="20" y="72" fill="#484f58" font-size="12" class="mono">{</text>

  <!-- row 1 -->
  <text x="40" y="90" font-size="12" class="mono">
    <tspan fill="#56b6c2">"focus"</tspan>
    <tspan fill="#484f58">  :  </tspan>
    <tspan fill="#cdd6f4">"Penetration Testing · Vulnerability Assessment · SIEM"</tspan>
  </text>

  <!-- row 2 -->
  <text x="40" y="108" font-size="12" class="mono">
    <tspan fill="#56b6c2">"status"</tspan>
    <tspan fill="#484f58"> :  </tspan>
    <tspan fill="#39d353">"actively learning · building · breaking things"</tspan>
  </text>

  <!-- row 3 -->
  <text x="40" y="126" font-size="12" class="mono">
    <tspan fill="#56b6c2">"goal"</tspan>
    <tspan fill="#484f58">   :  </tspan>
    <tspan fill="#FFD700">"Junior Penetration Tester"</tspan>
  </text>

  <!-- right brace -->
  <text x="20" y="144" fill="#484f58" font-size="12" class="mono">}</text>

  <!-- blinking cursor -->
  <rect x="30" y="131" width="7" height="12" fill="#39d353">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <rect width="800" height="160" rx="10" fill="url(#scan)" opacity="1"/>
</svg>
