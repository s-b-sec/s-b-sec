<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
    </style>
    <!-- Subtle scanline pattern for CRT feel -->
    <pattern id="scan" x="0" y="0" width="800" height="3" patternUnits="userSpaceOnUse">
      <rect width="800" height="1" fill="rgba(0,0,0,0.18)"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="800" height="200" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="800" height="30" rx="10" fill="#161b22"/>
  <rect y="20" width="800" height="12" fill="#161b22"/>

  <!-- macOS-style traffic lights -->
  <circle cx="22" cy="15" r="5.5" fill="#ff5f57"/>
  <circle cx="41" cy="15" r="5.5" fill="#febc2e"/>
  <circle cx="60" cy="15" r="5.5" fill="#28c840"/>

  <!-- Window title -->
  <text x="400" y="20" text-anchor="middle" fill="#484f58" font-size="12" class="mono">~/s-b-sec — zsh</text>

  <!-- ===================== TEXT CONTENT (drawn first, below covers) ===================== -->

  <!-- Row 1: prompt line A -->
  <text y="53" font-size="13" class="mono">
    <tspan x="18" fill="#39d353">┌──(</tspan><tspan fill="#e06c75">sayan</tspan><tspan fill="#39d353">㉿kali</tspan><tspan fill="#39d353">)-[</tspan><tspan fill="#cdd6f4">~</tspan><tspan fill="#39d353">]</tspan>
  </text>
  <!-- Row 1: prompt line B -->
  <text y="69" font-size="13" class="mono">
    <tspan x="18" fill="#39d353">└─</tspan><tspan fill="#e06c75">$ </tspan><tspan fill="#cdd6f4">whoami</tspan>
  </text>

  <!-- Row 2: whoami output — large yellow, the name -->
  <text x="18" y="92" font-size="21" font-weight="bold" fill="#FFD700" letter-spacing="3" class="mono">SAYAN BISWAS</text>

  <!-- Row 3: prompt line A -->
  <text y="118" font-size="13" class="mono">
    <tspan x="18" fill="#39d353">┌──(</tspan><tspan fill="#e06c75">sayan</tspan><tspan fill="#39d353">㉿kali</tspan><tspan fill="#39d353">)-[</tspan><tspan fill="#cdd6f4">~</tspan><tspan fill="#39d353">]</tspan>
  </text>
  <!-- Row 3: prompt line B -->
  <text y="134" font-size="13" class="mono">
    <tspan x="18" fill="#39d353">└─</tspan><tspan fill="#e06c75">$ </tspan><tspan fill="#cdd6f4">cat /etc/identity</tspan>
  </text>

  <!-- Row 4: identity output -->
  <text x="18" y="153" font-size="13" fill="#56b6c2" class="mono">Penetration Testing  ·  Ethical Hacking  ·  Vulnerability Assessment  ·  SIEM</text>

  <!-- Row 5: final prompt line A -->
  <text y="176" font-size="13" class="mono">
    <tspan x="18" fill="#39d353">┌──(</tspan><tspan fill="#e06c75">sayan</tspan><tspan fill="#39d353">㉿kali</tspan><tspan fill="#39d353">)-[</tspan><tspan fill="#cdd6f4">~</tspan><tspan fill="#39d353">]</tspan>
  </text>
  <!-- Row 5: prompt line B -->
  <text y="192" font-size="13" class="mono">
    <tspan x="18" fill="#39d353">└─</tspan><tspan fill="#e06c75">$ </tspan>
  </text>

  <!-- Blinking cursor (appears after all text revealed ~5s) -->
  <rect x="51" y="179" width="8" height="13" fill="#cdd6f4">
    <!-- hidden until text is done -->
    <animate attributeName="opacity" values="0;0;1;0;1;0;1" keyTimes="0;0.90;0.92;0.95;0.97;0.99;1"
      dur="6s" repeatCount="1" fill="freeze"/>
    <!-- then blink indefinitely -->
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="6s" repeatCount="indefinite"/>
  </rect>

  <!-- ===================== COVER RECTS (drawn last = on top, slide rightward to reveal) ===================== -->

  <!-- Cover row 1a — reveal at 0.3s -->
  <rect x="0" y="39" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="0.3s" dur="0.45s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover row 1b — reveal at 0.9s -->
  <rect x="0" y="57" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="0.9s" dur="0.45s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover whoami output — reveal at 1.5s -->
  <rect x="0" y="72" width="800" height="26" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="1.5s" dur="0.55s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover row 3a — reveal at 2.4s -->
  <rect x="0" y="104" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="2.4s" dur="0.45s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover row 3b — reveal at 3.0s -->
  <rect x="0" y="121" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="3.0s" dur="0.45s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover identity output — reveal at 3.6s -->
  <rect x="0" y="139" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="3.6s" dur="0.55s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover row 5a — reveal at 4.4s -->
  <rect x="0" y="162" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="4.4s" dur="0.45s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Cover row 5b — reveal at 5.0s -->
  <rect x="0" y="179" width="800" height="18" fill="#0d1117">
    <animate attributeName="x" from="0" to="800" begin="5.0s" dur="0.35s" fill="freeze" calcMode="linear"/>
  </rect>

  <!-- Scanline CRT overlay -->
  <rect width="800" height="200" rx="10" fill="url(#scan)" opacity="1"/>

  <!-- Subtle green vignette glow at bottom edge -->
  <rect x="0" y="170" width="800" height="30" rx="10" fill="url(#glow)" opacity="0.12"/>
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00ff41" stop-opacity="1"/>
    </linearGradient>
  </defs>
</svg>
