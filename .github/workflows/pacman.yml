name: Pac-Man Contribution Graph

on:
  schedule:
    - cron: "0 2 * * *"      # regenerates every day at 2 AM UTC
  workflow_dispatch:          # run manually anytime from Actions tab
  push:
    branches: [main]          # also runs on every push to main

permissions:
  contents: write

jobs:
  generate:
    name: Generate & Deploy SVG
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests --quiet

      # ── 4. Generate SVGs ───────────────────────────────────────────────────
      - name: Run Pac-Man generator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER:  ${{ github.repository_owner }}
        run: python .github/scripts/pacman.py

      # ── 5. Deploy to output branch ─────────────────────────────────────────
      - name: Deploy SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update pac-man graph [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
